<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80vw;
            height: 80vh;
            margin: 10px;
            border: 2px solid darksalmon;
        }

        .box {
            height: 50px;
            width: 50px;
            background-color: bisque;
            border: 2px solid blue;
            /* transform: rotateX(40deg); */
            /* transform: rotateY(40deg); */
            /* transform: rotateZ(40deg); */
            /* transform: skew(34deg); */
            /* transform: translateX(100%) skew(34deg) translateY(100%); */
            transform: rotate(5deg);
            transform-origin: -55% 455%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            box
        </div>
    </div>
</body>

</html>
