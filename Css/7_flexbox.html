<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar using Flexbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .logo img {
            width: 160px;
        }

        nav {
            background-color: aqua;
            width: 60vw;
            margin: auto;
            display: flex;
            justify-content: space-around;
            gap: 500PX;
            align-items: center;
        }

        .right ul {
            display: flex;
            gap: 34px;
        }

        .right ul li {
            list-style: none;
            font-size: larger;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="https://www.ultraedit.com/wp-content/uploads/2023/01/UE_Site-Logo-1.png"
                    alt="Ultra Edit Logo">
            </div>
            <div class="right">
                <ul>
                    <li><span>Product</span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24"
                            height="20" color="currentColor" fill="none" stroke="#141B34" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 9.00005C18 9.00005 13.5811 15 12 15C10.4188 15 6 9 6 9" />
                        </svg></li>
                    <li><span>Pricing</span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24"
                            height="20" color="currentColor" fill="none" stroke="#141B34" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 9.00005C18 9.00005 13.5811 15 12 15C10.4188 15 6 9 6 9" />
                        </svg></li>
                    <li><span>Resource</span> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24"
                            height="20" color="currentColor" fill="none" stroke="#141B34" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 9.00005C18 9.00005 13.5811 15 12 15C10.4188 15 6 9 6 9" />
                        </svg></li>
                    <li><span>About Us</span> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24"
                            height="20" color="currentColor" fill="none" stroke="#141B34" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 9.00005C18 9.00005 13.5811 15 12 15C10.4188 15 6 9 6 9" />
                        </svg></li>
                </ul>
            </div>
        </nav>
    </header>
</body>

</html>
