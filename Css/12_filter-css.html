<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Filters</title>
    <style>
        .container {
            display: flex;
            gap: 10px;
            transition: transform 0.5s ease-in-out 1s;
        }

        img {
            /* filter: blur(4px); */
            width: 50vw;
            height: 50vh;
            border-radius: 10px;
        }

        .img1 {
            /* filter: grayscale() */
            /* filter: sepia(); */
            filter: opacity(0.8);
        }

        .img2 {
            /* filter: brightness(10); */
            filter: sepia();
            /* filter: invert(); */

        }

        .img3 {
            /* filter: contrast(2); */
            filter: invert(.3);
        }

        .translate {
            transform: translateX(20vw) translateY(0%);
            rotate: calc(360deg);
        }
    </style>
</head>

<body>
    <div class="container translate">
        <img class="img1"
            src="https://thumbs.dreamstime.com/b/beautiful-rain-forest-ang-ka-nature-trail-doi-inthanon-national-park-thailand-36703721.jpg"
            alt="">
        <img class="img2"
            src="https://plus.unsplash.com/premium_photo-1689551670902-19b441a6afde?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="">
        <img class="img3"
            src="https://image-processor-storage.s3.us-west-2.amazonaws.com/images/281c2d4581ed27c8a258b0e79bc504ad/halo-of-neon-ring-illuminated-in-the-stunning-landscape-of-yosemite.jpg"
            alt="">
    </div>
</body>

</html>
