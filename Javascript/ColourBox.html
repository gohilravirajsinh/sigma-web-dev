<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colouring Box</title>
    <style>
        .container {
            height: 50pxpx;
            width: 90vw;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .box {
            height: 50px;
            width: 50px;
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotate 0.50s ease-in-out 1s infinite alternate, 1s infinite forwards;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0);
                border-radius: 50%;
            }

            100% {
                transform: rotate(-360deg);
                border-radius: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
    <script>
        // const box = document.querySelectorAll(".box")
        const boxes = document.querySelector(".container").children

        function getRandomNumber () {
            let val1 = Math.ceil(Math.random() * 255)
            let val2 =Math.ceil(Math.random() * 255)
            let val3 = Math.ceil(Math.random() * 255)
            return `rgb(${val1}, ${val2}, ${val3})`
        }

        setInterval(() => {
            let changes = Array.from(boxes).forEach((e) => {
                e.style.backgroundColor = getRandomNumber()
            })
        }, 100)
    </script>
</body>

</html>
