    class Animal {
        constructor(name) {
            this.name = name;
            console.log('Object is Crated...');
        }

        eats() {
            console.log('Khaa Rha Hoon...');
        }
        jumps() {
            console.log('Khud Rha Hoon...');
        }
    }

    class Lion extends Animal {
        constructor(name) {
            super(name)
            console.log('Object is Crated...');
        }
        eats() {
            super.eats()
            console.log('Khaa Rha Hoon with Roar...');
        }
        roar() {
            console.log('Mein Bhonk Rha Hun...');

        }
    }

    let a = new Animal("Bunny");
    console.log(a);

    let b = new Lion("Shera");
    console.log(b);
